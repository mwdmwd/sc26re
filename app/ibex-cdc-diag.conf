# Diagnostic build: keep only the CDC-ACM shell over USB. Do not enumerate
# Valve USB HID, so Steam cannot route inputs over USB while radio logs are
# captured on the same cable.
CONFIG_IBEX_USB_CDC_ONLY=y
CONFIG_IBEX_USB_HID=n
CONFIG_USB_DEVICE_HID=n
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_DEVICE_PID=0x1304
CONFIG_USB_DEVICE_PRODUCT="SC26re Ibex CFW CDC diag"
