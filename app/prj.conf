CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_LED=y
CONFIG_SENSOR=y
CONFIG_HWINFO=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

CONFIG_REBOOT=y
