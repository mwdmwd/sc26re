if { ![info exists STOCK_DUMP_DIR] } {
	error "STOCK_DUMP_DIR is required"
}

foreach region {FLASH FICR UICR} {
	if { ![info exists STOCK_DUMP_$region] } {
		set STOCK_DUMP_$region 1
	}
}

init
halt

echo "targets:"
targets
echo "flash banks:"
flash banks

if {$STOCK_DUMP_FLASH} {
	echo "dumping flash"
	dump_image [file join $STOCK_DUMP_DIR flash.bin] 0x00000000 0x00080000
}
if {$STOCK_DUMP_FICR} {
	echo "dumping FICR"
	dump_image [file join $STOCK_DUMP_DIR ficr.bin] 0x10000000 0x00001000
}
if {$STOCK_DUMP_UICR} {
	echo "dumping UICR"
	dump_image [file join $STOCK_DUMP_DIR uicr.bin] 0x10001000 0x00001000
}

resume
shutdown
