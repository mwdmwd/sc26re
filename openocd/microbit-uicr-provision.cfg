if { ![info exists IBEX_UICR_MAGIC] } {
	set IBEX_UICR_MAGIC 0xac32a429
}

if { ![info exists IBEX_UICR_BOARD_ID] } {
	set IBEX_UICR_BOARD_ID 0x45
}

init
reset halt

echo "before:"
echo [mdw 0x10001080 2]

echo "writing UICR CUSTOMER word 0 magic and CUSTOMER word 1 board id"
mww 0x4001e504 1
mww 0x10001080 $IBEX_UICR_MAGIC
mww 0x10001084 $IBEX_UICR_BOARD_ID
sleep 100
mww 0x4001e504 0

echo "after:"
echo [mdw 0x10001080 2]

reset run
shutdown
